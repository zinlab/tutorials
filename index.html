<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Resources Index</title>
    <style>
        :root {
            --bg-color: #fbfbfa;
            --text-main: #37352f;
            --text-secondary: rgba(55, 53, 47, 0.65);
            --border-color: rgba(55, 53, 47, 0.09);
            /* Match the colors from your image */
            --blue: #5fa4f1;
            --green: #90d18b;
            --red: #f1787c;
            --pink: #f1a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 80px 10% 40px;
            line-height: 1.5;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
            font-size: 14px;
        }

        .link-card:hover {
            background: rgba(55, 53, 47, 0.08);
        }

        .square {
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }

        /* Color classes */
        .bg-blue { background-color: var(--blue); }
        .bg-green { background-color: var(--green); }
        .bg-red { background-color: var(--red); }
        .bg-pink { background-color: var(--pink); }

        footer {
            margin-top: 60px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Resource Directory</h1>
    <p class="subtitle">Quick access to documentation and interactive guides.</p>

    <div class="grid">
        <!-- Main Entry Point -->
        <a href="nvidia-smi-guide.html" class="link-card">
            <div class="square bg-blue"></div>
            <span>nvidia-smi Deep Dive</span>
        </a>

        <!-- Placeholder for future files -->
        <a href="nsight-systems-mastery.html" class="link-card">
            <div class="square bg-green"></div>
            <span>Nsight Systems mastery</span>
        </a>

        <a href="nsight-compute-mastery.html" class="link-card">
            <div class="square bg-pink"></div>
            <span>Nsight Compute mastery</span>
        </a>
    </div>

    <footer>
        Click a resource above to view the interactive guide.
    </footer>

</body>
</html>
